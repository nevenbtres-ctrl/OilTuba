<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Al-Tuba Oil Depot - Tanks Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Roboto', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a3f2c 0%, #0e2a1c 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 248, 225, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.4);
            padding: 25px 20px 30px 20px;
            transition: all 0.2s;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid #c49a6c;
            padding-bottom: 12px;
        }
        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #2c3a1f;
            text-shadow: 2px 2px 0 #e9d6b0;
            font-weight: 800;
        }
        .datetime {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            background: #2b4b2f;
            color: #f9eec1;
            padding: 8px 18px;
            border-radius: 60px;
            margin-top: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: inset 0 1px 3px #00000033, 0 3px 6px rgba(0,0,0,0.2);
        }
        .datetime span {
            background: #1f321b;
            padding: 5px 12px;
            border-radius: 40px;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .grid-8 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 14px;
            margin: 20px 0 15px;
        }
        .tank-card {
            background: #feffea;
            border-radius: 28px;
            padding: 12px 6px;
            text-align: center;
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
            border: 1px solid #deb887;
        }
        .tank-card label {
            font-weight: bold;
            display: block;
            font-size: 1.1rem;
            background: #b97f44;
            color: white;
            width: fit-content;
            margin: 0 auto 8px auto;
            padding: 2px 14px;
            border-radius: 40px;
        }
        .tank-card input {
            width: 100%;
            padding: 12px 6px;
            font-size: 1.2rem;
            text-align: center;
            font-weight: bold;
            background: #fff6e0;
            border: 2px solid #ac8e5c;
            border-radius: 24px;
            color: black;
            outline: none;
            transition: 0.1s;
        }
        .tank-card input:focus {
            border-color: #f39c12;
            background: white;
        }

        .stok-area {
            background: #e9d8b0;
            margin: 10px 0 20px;
            padding: 12px;
            border-radius: 60px;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: inset 0 0 0 2px #fff7cf, 0 5px 12px black;
        }
        .stok-area label {
            font-size: 1.8rem;
            font-weight: 900;
            color: #2c2b26;
        }
        .stok-area input {
            font-size: 2rem;
            width: 200px;
            text-align: center;
            font-weight: bold;
            background: #171d0e;
            color: #f7d44a;
            border: none;
            border-radius: 48px;
            padding: 8px 15px;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .main-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: space-between;
            margin: 25px 0;
        }
        .stat-block {
            flex: 1;
            min-width: 230px;
            background: #fff3e0;
            border-radius: 40px;
            padding: 15px;
            box-shadow: 0 5px 0 #b78f54;
        }
        .stat-block h3 {
            text-align: center;
            background: #5b3e22;
            display: inline-block;
            width: 100%;
            padding: 6px;
            border-radius: 60px;
            color: #ffefb9;
            margin-bottom: 15px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            background: #fff2da;
            margin: 12px 0;
            padding: 8px 12px;
            border-radius: 34px;
            font-weight: bold;
            font-size: 1rem;
            border: 1px solid #cdaf86;
        }
        .stat-item span:first-child {
            color: #3a2c1c;
        }
        .stat-item span:last-child {
            background: #2c2b26;
            padding: 4px 14px;
            border-radius: 50px;
            color: #ffefb0;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .flow-section {
            background: #d9c48b;
            padding: 20px;
            border-radius: 50px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-around;
            align-items: flex-end;
        }
        .flow-item {
            flex: 1;
            min-width: 100px;
            text-align: center;
        }
        .flow-item label {
            font-weight: bold;
            background: #4f3e28;
            padding: 4px 15px;
            border-radius: 26px;
            color: #fae67a;
            display: inline-block;
            margin-bottom: 8px;
        }
        .flow-item input {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 40px;
            border: none;
            background: #fffbf0;
            font-weight: bold;
            color: black;
            border: 1px solid #aa7c44;
        }
        .receive-box {
            background: #3d522b;
            border-radius: 40px;
            padding: 10px 20px;
            text-align: center;
            color: #ffe9b6;
        }
        .receive-box label {
            font-size: 1.4rem;
            font-weight: bold;
        }
        .receive-box input {
            font-size: 2rem;
            width: 200px;
            text-align: center;
            background: #fffaec;
            border-radius: 60px;
            border: none;
            font-weight: bold;
            color: black;
            margin-top: 8px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 35px 0 15px;
        }
        .btn {
            border: none;
            background: #2f4d2d;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 44px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 6px black;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-danger {
            background: #9e3c2b;
        }
        .btn-warning {
            background: #cd8733;
        }
        .btn-dark {
            background: #2b2b2b;
        }
        .btn:hover {
            transform: scale(0.97);
            filter: brightness(1.05);
        }
        .alert-msg {
            background: #1a1f12d0;
            backdrop-filter: blur(8px);
            margin-top: 20px;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            color: #f9e0a0;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        input:disabled, input[readonly] {
            background-color: #e0dbc8;
            color: #1f2a0e;
            cursor: not-allowed;
        }
        @media (max-width: 720px) {
            .dashboard { padding: 15px; }
            .btn { padding: 8px 16px; font-size: 0.8rem; }
            .stat-item span:last-child { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="dashboard" id="appContainer">
    <div class="header">
        <h1>Al-Tuba Oil Depot</h1>
        <div class="datetime" id="liveDateTime">
            <span id="year">2025</span>
            <span id="weekday">Tuesday</span>
            <span id="date">01/01/2025</span>
            <span id="time">00:00:00</span>
        </div>
    </div>

    <div class="grid-8" id="tanksGrid"></div>

    <!-- Stok area with barrel icon -->
    <div class="stok-area">
        <label>🛢️ STOK (Total Sum)</label>
        <input type="text" id="stokField" readonly value="">
    </div>

    <div class="main-stats">
        <div class="stat-block">
            <h3>🟦 METRIC (m³)</h3>
            <div class="stat-item"><span>Total.m3 :</span><span id="totalM3"></span></div>
            <div class="stat-item"><span>Avail.m3 :</span><span id="availM3"></span></div>
            <div class="stat-item"><span>Free.m3 :</span><span id="freeM3"></span></div>
        </div>
        <div class="stat-block">
            <h3>🛢️ BARRELS (bbl)</h3>
            <div class="stat-item"><span>Total.b :</span><span id="totalB"></span></div>
            <div class="stat-item"><span>Avail.b :</span><span id="availB"></span></div>
            <div class="stat-item"><span>Free.b :</span><span id="freeB"></span></div>
        </div>
    </div>

    <!-- Flow section: Flow, Rec, More, Less, Diff, receive + new fields FLOW/2 , REC/2 -->
    <div class="flow-section">
        <div class="flow-item"><label>Flow</label><input type="text" id="flowVal" value=""></div>
        <div class="flow-item"><label>Rec</label><input type="text" id="recVal" value=""></div>
        <div class="flow-item"><label>More</label><input type="text" id="moreVal" value=""></div>
        <div class="flow-item"><label>Less</label><input type="text" id="lessVal" value=""></div>
        <div class="flow-item"><label>Diff</label><input type="text" id="diffVal" readonly value=""></div>
        <div class="receive-box"><label>📌 receive</label><input type="text" id="receiveField" readonly value=""></div>
        <!-- NEW FIELDS: FLOW/2 and REC/2 -->
        <div class="flow-item"><label>FLOW/2</label><input type="text" id="halfFlowField" readonly></div>
        <div class="flow-item"><label>REC/2</label><input type="text" id="halfRecField" readonly></div>
    </div>

    <div class="action-buttons">
        <button class="btn" id="resetBtn">🧹 Reset</button>
        <button class="btn btn-warning" id="imageBtn">📸 Save as JPG</button>
        <button class="btn btn-danger" id="closeBtn">🚪 Close</button>
        <button class="btn btn-dark" id="disableResetBtn">🔒 Disable / Restart</button>
    </div>
    <div class="alert-msg" id="notificationArea">✓ System ready | Programming: Osama Abdul Abbas</div>
</div>

<script>
    // Tank definitions
    const tankNames = ['Tk.3', 'Tk.4', 'Tk.5', 'Tk.7', 'Tk.8', 'Tk.9', 'Tk.10', 'Tk.11'];
    const tankIds = ['tk3','tk4','tk5','tk7','tk8','tk9','tk10','tk11'];
    let tanksInputs = {};

    const tanksGrid = document.getElementById('tanksGrid');
    tankNames.forEach((name, idx) => {
        const card = document.createElement('div');
        card.className = 'tank-card';
        const label = document.createElement('label');
        label.textContent = name;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = '';
        input.id = tankIds[idx];
        input.classList.add('tank-input');
        card.appendChild(label);
        card.appendChild(input);
        tanksGrid.appendChild(card);
        tanksInputs[tankIds[idx]] = input;
    });

    // DOM references
    const stokField = document.getElementById('stokField');
    const totalM3Span = document.getElementById('totalM3');
    const availM3Span = document.getElementById('availM3');
    const freeM3Span = document.getElementById('freeM3');
    const totalBSpan = document.getElementById('totalB');
    const availBSpan = document.getElementById('availB');
    const freeBSpan = document.getElementById('freeB');
    const flowInput = document.getElementById('flowVal');
    const recInput = document.getElementById('recVal');
    const moreInput = document.getElementById('moreVal');
    const lessInput = document.getElementById('lessVal');
    const diffInput = document.getElementById('diffVal');
    const receiveField = document.getElementById('receiveField');
    const notificationDiv = document.getElementById('notificationArea');
    
    // New half fields references
    const halfFlowField = document.getElementById('halfFlowField');
    const halfRecField = document.getElementById('halfRecField');

    let isProgramDisabled = false;

    // Helper: format positive number with commas, no decimals, no negative sign, empty if zero
    function formatNumberForDisplay(value) {
        let num = parseFloat(value);
        if (isNaN(num)) return '';
        num = Math.abs(Math.round(num));
        if (num === 0) return '';
        return num.toLocaleString('en-US');
    }
    
    // Helper: format signed number (positive or negative) with commas and optional minus sign
    function formatSignedNumber(value) {
        let num = parseFloat(value);
        if (isNaN(num)) return '';
        let rounded = Math.round(num);
        if (rounded === 0) return '';
        let absFormatted = Math.abs(rounded).toLocaleString('en-US');
        return rounded < 0 ? `-${absFormatted}` : absFormatted;
    }

    // Parse formatted string back to number (positive only, for m3 counts)
    function parseFormattedNumber(str) {
        if (!str || str.trim() === '') return 0;
        let clean = str.replace(/,/g, '');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }
    
    // Parse signed string (can be negative, with commas)
    function parseSignedNumber(str) {
        if (!str || str.trim() === '') return 0;
        let clean = str.replace(/,/g, '');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : Math.round(num);
    }

    // Apply formatting to input fields on blur, and also store numeric value internally
    function setupInputFormatting(inputElement) {
        inputElement.addEventListener('blur', function() {
            if (isProgramDisabled) return;
            let raw = inputElement.value;
            let num = parseFormattedNumber(raw);
            if (isNaN(num)) num = 0;
            num = Math.abs(Math.round(num));
            if (num === 0) {
                inputElement.value = '';
            } else {
                inputElement.value = formatNumberForDisplay(num);
            }
            // trigger update after formatting
            inputElement.dispatchEvent(new Event('change'));
        });
        inputElement.addEventListener('focus', function() {
            if (isProgramDisabled) return;
            let currentVal = parseFormattedNumber(inputElement.value);
            if (currentVal === 0 || isNaN(currentVal)) {
                inputElement.value = '';
            } else {
                inputElement.value = currentVal.toString();
            }
        });
        inputElement.addEventListener('input', function(e) {
            // allow digits
            let val = e.target.value;
            if (val === '') return;
            let numeric = parseFloat(val.replace(/,/g, ''));
            if (isNaN(numeric)) {
                e.target.value = '';
            }
        });
    }

    function getNumericValue(inputEl) {
        let raw = inputEl.value;
        if (raw === '') return 0;
        let num = parseFormattedNumber(raw);
        return Math.abs(Math.round(num));
    }

    function setFormattedValue(inputEl, numValue) {
        let absRounded = Math.abs(Math.round(numValue));
        if (absRounded === 0) {
            inputEl.value = '';
        } else {
            inputEl.value = formatNumberForDisplay(absRounded);
        }
    }

    // Update Diff based on More or Less (priority More)
    function updateDiff() {
        let more = getNumericValue(moreInput);
        let less = getNumericValue(lessInput);
        let diffValue = 0;
        if (more !== 0) {
            diffValue = more * 66;
        } else if (less !== 0) {
            diffValue = less * 66;
        }
        setFormattedValue(diffInput, diffValue);
        return diffValue;
    }

    // Update Stok and derived metrics (m3 / barrels) with hiding when sum zero
    function updateStokAndDerived() {
        if (isProgramDisabled) return;
        let sum = 0;
        for (let id of tankIds) {
            let val = getNumericValue(tanksInputs[id]);
            sum += val;
        }
        // Stok field
        if (sum === 0) {
            stokField.value = '';
        } else {
            stokField.value = formatNumberForDisplay(sum);
        }
        
        let totalM3 = sum * 66;
        let availM3 = totalM3 - 100000;
        let freeM3 = 403600 - totalM3;

        let totalB = totalM3 * 6.2898;
        let availB = availM3 * 6.2898;
        let freeB = freeM3 * 6.2898;

        if (sum === 0) {
            totalM3Span.innerText = '';
            availM3Span.innerText = '';
            freeM3Span.innerText = '';
            totalBSpan.innerText = '';
            availBSpan.innerText = '';
            freeBSpan.innerText = '';
        } else {
            totalM3Span.innerText = formatNumberForDisplay(totalM3);
            availM3Span.innerText = formatNumberForDisplay(availM3);
            freeM3Span.innerText = formatNumberForDisplay(freeM3);
            totalBSpan.innerText = formatNumberForDisplay(totalB);
            availBSpan.innerText = formatNumberForDisplay(availB);
            freeBSpan.innerText = formatNumberForDisplay(freeB);
        }
    }

    // NEW: Update FLOW/2 and REC/2 based on current Flow, Rec, and Receive (signed)
    function updateHalfValues() {
        if (isProgramDisabled) return;
        
        // Flow/2
        let flowNum = getNumericValue(flowInput);
        let halfFlow = Math.round(flowNum / 2);
        if (halfFlow === 0) {
            halfFlowField.value = '';
        } else {
            halfFlowField.value = formatNumberForDisplay(halfFlow);
        }
        
        // REC/2 = (Rec + receive) / 2
        let recNum = getNumericValue(recInput);
        let receiveRaw = receiveField.value;
        let receiveNum = parseSignedNumber(receiveRaw);
        let halfRecRaw = (recNum + receiveNum) / 2;
        let halfRec = Math.round(halfRecRaw);
        if (halfRec === 0) {
            halfRecField.value = '';
        } else {
            halfRecField.value = formatSignedNumber(halfRec);
        }
    }

    // Update receive based on More/Less, Diff, and new rule: if both more/less zero => receive = Flow - Rec
    function updateReceive() {
        if (isProgramDisabled) return;
        let flow = getNumericValue(flowInput);
        let rec = getNumericValue(recInput);
        let more = getNumericValue(moreInput);
        let less = getNumericValue(lessInput);
        let diff = updateDiff();  // ensures diff field is up to date
        
        let result = 0;
        const moreHasValue = more !== 0;
        const lessHasValue = less !== 0;

        if (moreHasValue) {
            result = diff + flow - rec;
        } else if (lessHasValue) {
            result = flow - diff - rec;
        } else {
            // when both more and less are zero, receive = Flow - Rec
            result = flow - rec;
        }
        
        let finalResult = Math.round(result);
        if (finalResult === 0) {
            receiveField.value = '';
        } else {
            receiveField.value = formatSignedNumber(finalResult);
        }
        
        // After receive is updated, refresh half values
        updateHalfValues();
    }

    // Reset all fields (set to empty)
    function resetAll() {
        if (isProgramDisabled) {
            showNotification("⚠️ System disabled. Cannot reset until restart.", 3000);
            return;
        }
        for (let id of tankIds) {
            tanksInputs[id].value = '';
        }
        flowInput.value = '';
        recInput.value = '';
        moreInput.value = '';
        lessInput.value = '';
        // update Stok & derived and receive/diff/half
        updateStokAndDerived();
        updateReceive();  // this will also update diff and half values
        showNotification("✅ All fields cleared and reset.", 2000);
    }

    function showNotification(msg, duration = 3000) {
        notificationDiv.innerHTML = `🔔 ${msg}`;
        setTimeout(() => {
            if(notificationDiv.innerHTML.includes(msg))
                notificationDiv.innerHTML = `✓ System ready | Programming: Osama Abdul Abbas`;
        }, duration);
    }

    // Date & Time live update (English)
    function updateDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const weekday = days[now.getDay()];
        const dateStr = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${year}`;
        const timeStr = now.toLocaleTimeString('en-US');
        document.getElementById('year').innerText = year;
        document.getElementById('weekday').innerText = weekday;
        document.getElementById('date').innerText = dateStr;
        document.getElementById('time').innerText = timeStr;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Capture as JPG
    async function captureAsJPG() {
        const element = document.getElementById('appContainer');
        if(!element) return;
        try {
            showNotification("📸 Generating image ...", 1500);
            const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#fdf5e6', logging: false });
            const link = document.createElement('a');
            link.download = 'Al-Tuba_Depot.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
            showNotification("✅ Image saved as JPG", 2000);
        } catch(e) {
            showNotification("❌ Failed to capture image", 2000);
        }
    }

    // Close with confirmation and message
    function closeProgram() {
        const confirmClose = confirm("Program will close.\nProgramming: Osama Abdul Abbas");
        if(confirmClose) {
            alert("Programming: Osama Abdul Abbas");
            window.close();
            showNotification("Close requested, close tab manually if needed", 3000);
        }
    }

    // Disable / Restart with password (also controls new half fields)
    function disableOrRestartWithPassword() {
        const pwd = prompt("Enter password to secure action:");
        if(pwd === "2291977") {
            const choice = confirm("OK = DISABLE system (lock all fields)\nCancel = RESTART system (enable & clear)");
            if(choice === true) {
                // DISABLE
                if(!isProgramDisabled) {
                    isProgramDisabled = true;
                    for (let id of tankIds) {
                        tanksInputs[id].disabled = true;
                    }
                    flowInput.disabled = true;
                    recInput.disabled = true;
                    moreInput.disabled = true;
                    lessInput.disabled = true;
                    diffInput.disabled = true;
                    receiveField.disabled = true;
                    halfFlowField.disabled = true;
                    halfRecField.disabled = true;
                    document.getElementById('resetBtn').disabled = true;
                    showNotification("⚠️ SYSTEM DISABLED by administrator. No edits allowed.", 4000);
                    notificationDiv.style.background = "#6b2e1f";
                } else {
                    showNotification("System already disabled! Use Restart to re-enable.", 2500);
                }
            } else {
                // RESTART: enable all, reset fields
                if(isProgramDisabled) {
                    isProgramDisabled = false;
                    for (let id of tankIds) {
                        tanksInputs[id].disabled = false;
                    }
                    flowInput.disabled = false;
                    recInput.disabled = false;
                    moreInput.disabled = false;
                    lessInput.disabled = false;
                    diffInput.disabled = false;
                    receiveField.disabled = false;
                    halfFlowField.disabled = false;
                    halfRecField.disabled = false;
                    document.getElementById('resetBtn').disabled = false;
                }
                // reset all values to empty (full fresh)
                for (let id of tankIds) {
                    tanksInputs[id].value = '';
                }
                flowInput.value = '';
                recInput.value = '';
                moreInput.value = '';
                lessInput.value = '';
                updateStokAndDerived();
                updateReceive();  // recompute diff, receive, half values
                showNotification("🔄 System RESTARTED, all fields enabled and cleared.", 3000);
                notificationDiv.style.background = "#1a1f12d0";
            }
        } else {
            showNotification("❌ Incorrect password! Action denied.", 2500);
        }
    }

    // Attach event listeners and formatting
    function bindEvents() {
        for (let id of tankIds) {
            const inp = tanksInputs[id];
            setupInputFormatting(inp);
            inp.addEventListener('change', () => updateStokAndDerived());
        }
        const dynamicInputs = [flowInput, recInput, moreInput, lessInput];
        dynamicInputs.forEach(inp => {
            setupInputFormatting(inp);
            inp.addEventListener('change', () => {
                updateReceive();   // recalculates diff, receive & half values
                updateStokAndDerived();
            });
        });
    }

    function init() {
        bindEvents();
        updateStokAndDerived();
        updateReceive();  // sets diff, receive and half values initially
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('imageBtn').addEventListener('click', captureAsJPG);
        document.getElementById('closeBtn').addEventListener('click', closeProgram);
        document.getElementById('disableResetBtn').addEventListener('click', disableOrRestartWithPassword);
        
        // Additional safety: ensure half fields are updated if receive changes via other triggers (already inside updateReceive)
        // and also ensure that half fields formatting respects disabled state.
    }

    init();
</script>
</body>
